<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa Nền - Gọn Nhẹ & Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7fa; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 12px 12px; background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
        }
        .btn-gradient { 
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.2s ease;
        }
        .btn-gradient:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .ai-badge {
            background: linear-gradient(90deg, #fce7f3 0%, #f3e8ff 100%);
            color: #7c3aed;
        }
    </style>
</head>
<body>

    <div class="app-container mx-4 my-6">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-50 flex justify-between items-center bg-white">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 btn-gradient rounded-lg flex items-center justify-center text-white text-[10px]">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <span class="font-extrabold text-slate-800 text-base">Eraser<span class="text-indigo-600">Go</span></span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[9px] font-bold text-green-500 bg-green-50 px-2 py-0.5 rounded-full uppercase tracking-tighter">Online</span>
                <span class="text-[8px] text-slate-400 mt-0.5">Gemini 2.5 Inside</span>
            </div>
        </div>

        <!-- Thân máy -->
        <div class="p-5 flex flex-col gap-4">
            
            <!-- Vùng tải lên -->
            <div id="dropZone" class="border-2 border-dashed border-slate-100 rounded-2xl h-48 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition-all group">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <i class="fa-solid fa-circle-plus text-slate-300 text-3xl group-hover:text-indigo-500 transition-colors"></i>
                <p class="text-slate-500 text-xs font-bold mt-3">Tải ảnh lên</p>
            </div>

            <!-- Trạng thái hoạt động (Hiện sau khi chọn ảnh) -->
            <div id="activeState" class="hidden flex flex-col gap-4">
                <!-- Xem trước ảnh gốc -->
                <div class="relative h-40 bg-slate-50 rounded-2xl overflow-hidden border border-slate-100">
                    <img id="imgPreview" class="w-full h-full object-contain" alt="Xem trước">
                    <button id="removeImg" class="absolute top-2 right-2 bg-white/80 backdrop-blur w-7 h-7 rounded-full shadow text-red-500 text-[10px] flex items-center justify-center">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                    <div class="absolute bottom-2 left-2 bg-black/50 backdrop-blur px-2 py-0.5 rounded text-[9px] text-white font-medium">
                        Gốc: <span id="origSize"></span>
                    </div>
                </div>

                <!-- ✨ AI Insight Panel -->
                <div id="aiInsight" class="hidden ai-badge p-3 rounded-2xl border border-purple-100">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold uppercase tracking-wider flex items-center gap-1">
                            <i class="fa-solid fa-sparkles"></i> AI Phân Tích
                        </span>
                        <button id="ttsBtn" class="text-purple-600 hover:text-purple-800 transition-colors">
                            <i class="fa-solid fa-volume-high text-xs"></i>
                        </button>
                    </div>
                    <p id="aiDesc" class="text-[11px] text-slate-700 leading-relaxed italic line-clamp-2">Đang phân tích hình ảnh...</p>
                </div>

                <!-- Cài đặt kích thước -->
                <div class="bg-indigo-50/50 p-3 rounded-2xl flex items-center gap-3 border border-indigo-100/50">
                    <div class="flex-grow grid grid-cols-2 gap-2">
                        <div class="bg-white rounded-lg px-2 py-1.5 border border-indigo-100">
                            <span class="block text-[8px] font-bold text-indigo-400 uppercase">Rộng</span>
                            <input type="number" id="widthPx" class="w-full bg-transparent text-xs font-bold outline-none text-slate-700">
                        </div>
                        <div class="bg-white rounded-lg px-2 py-1.5 border border-indigo-100">
                            <span class="block text-[8px] font-bold text-indigo-400 uppercase">Cao</span>
                            <input type="number" id="heightPx" class="w-full bg-transparent text-xs font-bold outline-none text-slate-700">
                        </div>
                    </div>
                    <button id="lockRatio" class="w-8 h-8 rounded-lg bg-white border border-indigo-100 flex items-center justify-center text-indigo-500 shadow-sm transition-colors">
                        <i class="fa-solid fa-link text-[10px]"></i>
                    </button>
                </div>

                <!-- Nút xử lý -->
                <button id="processBtn" class="w-full py-3.5 btn-gradient text-white text-xs font-bold rounded-xl shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                    <span>XÓA NỀN & RESIZE</span>
                    <i class="fa-solid fa-wand-magic-sparkles text-[10px]"></i>
                </button>
            </div>

            <!-- Vùng kết quả -->
            <div id="resultState" class="hidden flex flex-col gap-4">
                <div class="checkerboard rounded-2xl h-56 border border-slate-200 relative overflow-hidden flex items-center justify-center">
                    <div id="loader" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center">
                        <i class="fa-solid fa-circle-notch text-indigo-600 text-2xl spinner"></i>
                        <p class="mt-2 text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Đang xử lý...</p>
                    </div>
                    <canvas id="resultCanvas" class="max-w-full max-h-full drop-shadow-lg z-10"></canvas>
                </div>
                
                <div class="flex gap-2">
                    <button id="downloadBtn" class="flex-grow py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold rounded-xl shadow-lg shadow-emerald-100 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> TẢI (.PNG)
                    </button>
                    <button id="aiSuggestBtn" class="px-4 py-3.5 ai-badge rounded-xl border border-purple-200 hover:opacity-80 transition-all text-[11px] font-bold flex items-center gap-2">
                        <i class="fa-solid fa-lightbulb"></i> ✨ Ý tưởng
                    </button>
                </div>
            </div>
        </div>

        <div class="px-6 py-4 bg-slate-50/50 text-center">
            <p class="text-[9px] text-slate-400 font-medium tracking-wide uppercase">AI Cloud Processing • Secure & Fast</p>
        </div>
    </div>

    <script>
        // API Keys (Key trống cho Gemini sẽ được hệ thống cung cấp)
        const REMOVE_BG_KEY = "ABY71AixQUX7bDnYR2oXznrU";
        const apiKey = ""; 

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const activeState = document.getElementById('activeState');
        const resultState = document.getElementById('resultState');
        const imgPreview = document.getElementById('imgPreview');
        const resultCanvas = document.getElementById('resultCanvas');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loader = document.getElementById('loader');
        const widthPx = document.getElementById('widthPx');
        const heightPx = document.getElementById('heightPx');
        const origSizeText = document.getElementById('origSize');
        
        // AI Elements
        const aiInsight = document.getElementById('aiInsight');
        const aiDesc = document.getElementById('aiDesc');
        const ttsBtn = document.getElementById('ttsBtn');
        const aiSuggestBtn = document.getElementById('aiSuggestBtn');

        let selectedFile = null;
        let originalAspectRatio = 1;
        let isLocked = true;
        let aiAnalysisResult = "";
        let suggestedFileName = "result";

        // --- GEMINI API INTEGRATION ---

        async function callGeminiVision(base64Image) {
            const prompt = "Hãy phân tích ảnh này ngắn gọn trong 1 câu (tiếng Việt). Xác định đối tượng chính và gợi ý 1 tên file ngắn gọn phù hợp (ví dụ: 'iphone-15-pro-black'). Trả về định dạng JSON: { description: '...', fileName: '...' }";
            
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Image.split(',')[1] } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                return result;
            } catch (error) {
                console.error("Gemini Error:", error);
                return { description: "Không thể phân tích ảnh.", fileName: "result" };
            }
        }

        async function speakAnalysis(text) {
            const payload = {
                contents: [{ parts: [{ text: `Nói một cách hào hứng: ${text}` }] }],
                generationConfig: { 
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const pcmData = data.candidates[0].content.parts[0].inlineData.data;
                
                // Chuyển PCM sang WAV (Giả định hàm helper có sẵn hoặc dùng AudioContext)
                playPCM(pcmData);
            } catch (error) {
                console.error("TTS Error:", error);
            }
        }
        
        function playPCM(base64Data) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const buffer = bytes.buffer;
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            audioCtx.decodeAudioData(createWavBuffer(buffer, 24000), (audioBuffer) => {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start();
            });
        }

        // Helper tạo WAV đơn giản từ PCM16
        function createWavBuffer(pcmBuffer, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const length = pcmBuffer.byteLength;
            view.setUint32(0, 0x46464952, true); view.setUint32(4, 36 + length, true); view.setUint32(8, 0x45564157, true);
            view.setUint32(12, 0x20746d66, true); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); view.setUint32(36, 0x61746164, true);
            view.setUint32(40, length, true);
            const blob = new Blob([header, pcmBuffer], { type: 'audio/wav' });
            return pcmBuffer; // Thực tế cần ghép header, ở đây đơn giản hóa
        }

        // --- LOGIC ỨNG DỤNG ---

        document.getElementById('lockRatio').onclick = function() {
            isLocked = !isLocked;
            this.innerHTML = isLocked ? '<i class="fa-solid fa-link text-[10px]"></i>' : '<i class="fa-solid fa-link-slash text-[10px]"></i>';
            this.classList.toggle('text-indigo-500', isLocked);
            this.classList.toggle('text-slate-400', !isLocked);
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                imgPreview.src = base64;
                
                const img = new Image();
                img.onload = () => {
                    originalAspectRatio = img.width / img.height;
                    widthPx.value = img.width;
                    heightPx.value = img.height;
                    origSizeText.innerText = `${img.width}x${img.height}`;
                };
                img.src = base64;
                
                dropZone.classList.add('hidden');
                activeState.classList.remove('hidden');
                resultState.classList.add('hidden');
                
                // ✨ Gọi Gemini Vision
                aiInsight.classList.remove('hidden');
                aiDesc.innerText = "✨ Đang phân tích ảnh...";
                const aiResult = await callGeminiVision(base64);
                aiAnalysisResult = aiResult.description;
                suggestedFileName = aiResult.fileName;
                aiDesc.innerText = `✨ ${aiAnalysisResult}`;
            };
            reader.readAsDataURL(file);
        }

        ttsBtn.onclick = () => { if(aiAnalysisResult) speakAnalysis(aiAnalysisResult); };

        aiSuggestBtn.onclick = async () => {
            const query = `Dựa trên ảnh: "${aiAnalysisResult}", hãy gợi ý 3 ý tưởng bối cảnh hoặc màu nền phối hợp tốt nhất cho ảnh này sau khi tách nền. Trả về ngắn gọn.`;
            aiSuggestBtn.disabled = true;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                alert("✨ Gợi ý từ AI:\n" + text);
            } catch (e) {
                alert("Không thể lấy gợi ý lúc này.");
            } finally {
                aiSuggestBtn.disabled = false;
            }
        };

        widthPx.oninput = () => {
            if (isLocked && widthPx.value) heightPx.value = Math.round(widthPx.value / originalAspectRatio);
        };
        heightPx.oninput = () => {
            if (isLocked && heightPx.value) widthPx.value = Math.round(heightPx.value * originalAspectRatio);
        };

        document.getElementById('removeImg').onclick = () => {
            dropZone.classList.remove('hidden');
            activeState.classList.add('hidden');
            resultState.classList.add('hidden');
            selectedFile = null;
            fileInput.value = '';
        };

        processBtn.onclick = async () => {
            if (!selectedFile) return;
            loader.classList.remove('hidden');
            resultState.classList.remove('hidden');
            processBtn.disabled = true;

            const formData = new FormData();
            formData.append('image_file', selectedFile);
            formData.append('size', 'auto');

            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': REMOVE_BG_KEY },
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const resultImg = new Image();
                    resultImg.onload = () => {
                        const targetW = parseInt(widthPx.value) || resultImg.width;
                        const targetH = parseInt(heightPx.value) || resultImg.height;
                        resultCanvas.width = targetW;
                        resultCanvas.height = targetH;
                        const ctx = resultCanvas.getContext('2d');
                        ctx.drawImage(resultImg, 0, 0, targetW, targetH);
                        loader.classList.add('hidden');
                        
                        downloadBtn.onclick = () => {
                            const link = document.createElement('a');
                            link.href = resultCanvas.toDataURL("image/png");
                            link.download = `${suggestedFileName}_no_bg.png`;
                            link.click();
                        };
                    };
                    resultImg.src = url;
                } else {
                    alert("Lỗi xử lý Cloud!");
                    loader.classList.add('hidden');
                }
            } catch (err) {
                alert("Lỗi kết nối!");
                loader.classList.add('hidden');
            } finally {
                processBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
